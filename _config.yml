# Site-wide settings
# ------------------
title: Hyperspace
tagline: Just another fine responsive site template
description: >
  Hyperspace by HTML5 UP — a fun, blocky, one-page responsive site template,
  converted to Jekyll. Edit this description in _config.yml.
author:
  name: Untitled
  email: user@untitled.tld
lang: en_US

# Public base URL of the site. Required for absolute URLs in seo.html and
# the sitemap. Change to your real domain before deploying.
url: "https://example.com"
baseurl: ""

# Default OpenGraph share image / template-gallery thumbnail.
# 1280x800 (16:10) homepage screenshot — keep the key visual near the top,
# since the gallery card crops wider images from the top to fit.
image: /assets/og-image.png

# Footer copyright line.
copyright: "Untitled. All rights reserved."

# Build settings
# --------------
plugins:
  - jekyll-sitemap

exclude:
  - README.txt
  - LICENSE.txt
  - DEVELOPMENT.md
  - .gitignore
