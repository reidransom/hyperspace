<header id="header">
	<a href="{{ '/' | relative_url }}" class="title">{{ site.title }}</a>
	<nav>
		<ul>
			{%- for item in site.data.navigation_main %}
			<li><a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.title }}</a></li>
			{%- endfor %}
		</ul>
	</nav>
</header>
